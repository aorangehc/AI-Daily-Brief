name: Render

on:
  workflow_dispatch:
    inputs:
      date:
        description: "Date (YYYY-MM-DD)"
        required: true

concurrency:
  group: render-${{ github.ref }}
  cancel-in-progress: false

env:
  TZ: Asia/Shanghai

jobs:
  render:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Build renderer
        run: go build -o bin/renderer ./cmd/renderer

      - name: Determine date
        id: vars
        run: |
          echo "date=${{ inputs.date }}" >> $GITHUB_OUTPUT

      - name: Run renderer
        env:
          DATE: ${{ steps.vars.outputs.date }}
        run: ./bin/renderer --date=$DATE --verbose

      - name: Commit data
        run: |
          git config --local user.email "bot@ai-daily-brief.com"
          git config --local user.name "AI Daily Brief Bot"
          git add data/ site/public/data/
          git diff --cached --quiet || git commit -m "build: regenerate site indexes for ${{ steps.vars.outputs.date }}"
          git push


name: Render

on:
  workflow_run:
    workflows: ["Digest"]
    types: [completed]
  workflow_dispatch:
    inputs:
      date:
        description: "Date (YYYY-MM-DD)"
        required: true

concurrency:
  group: render-${{ github.ref }}
  cancel-in-progress: false

env:
  TZ: Asia/Shanghai

jobs:
  render:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Build renderer
        run: go build -o bin/renderer ./cmd/renderer

      - name: Determine date
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "date=${{ inputs.date }}" >> $GITHUB_OUTPUT
          else
            echo "date=$(date +%Y-%m-%d)" >> $GITHUB_OUTPUT
          fi

      - name: Run renderer
        env:
          DATE: ${{ steps.vars.outputs.date }}
        run: ./bin/renderer --date=$DATE --verbose

      - name: Commit data
        run: |
          git config --local user.email "bot@ai-daily-brief.com"
          git config --local user.name "AI Daily Brief Bot"
          git add data/ site/src/data/
          git diff --cached --quiet || git commit -m "build: regenerate site indexes for ${{ steps.vars.outputs.date }}"
          git push

      - name: Trigger deploy
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy.yml',
              ref: context.ref,
              inputs: { date: '${{ steps.vars.outputs.date }}' }
            })

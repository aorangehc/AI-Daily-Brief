name: Deploy

on:
  workflow_run:
    workflows: ["Render"]
    types: [completed]
  workflow_dispatch:
    inputs:
      date:
        description: "Date (YYYY-MM-DD)"
        required: true

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  TZ: Asia/Shanghai

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: site
        run: npm install

      - name: Build site
        working-directory: site
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Update state
        run: |
          DATE=${{ inputs.date || github.event.inputs.date }}
          STATE_FILE="data/state/${DATE}.json"
          if [ -f "$STATE_FILE" ]; then
            echo "Deploy completed for $DATE"
          fi

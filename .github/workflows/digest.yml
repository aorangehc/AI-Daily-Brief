name: Digest

on:
  workflow_dispatch:
    inputs:
      date:
        description: "Date (YYYY-MM-DD)"
        required: true

concurrency:
  group: digest-${{ github.ref }}
  cancel-in-progress: false

env:
  TZ: Asia/Shanghai

jobs:
  digest:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Build binaries
        run: |
          go build -o bin/normalizer ./cmd/normalizer
          go build -o bin/deduper ./cmd/deduper
          go build -o bin/scorer ./cmd/scorer
          go build -o bin/digestor ./cmd/digestor

      - name: Determine date
        id: vars
        run: |
          echo "date=${{ inputs.date }}" >> $GITHUB_OUTPUT

      - name: Check state for idempotency
        id: check-state
        run: |
          state_file="data/state/${{ steps.vars.outputs.date }}.json"
          if [ -f "$state_file" ]; then
            if grep -q '"digest": "success"' "$state_file"; then
              echo "already_done=true" >> $GITHUB_OUTPUT
            else
              echo "already_done=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "already_done=false" >> $GITHUB_OUTPUT
          fi

      - name: Run normalizer
        if: steps.check-state.outputs.already_done != 'true'
        env:
          DATE: ${{ steps.vars.outputs.date }}
        run: ./bin/normalizer --date=$DATE --verbose

      - name: Run deduper
        if: steps.check-state.outputs.already_done != 'true'
        env:
          DATE: ${{ steps.vars.outputs.date }}
        run: ./bin/deduper --date=$DATE --verbose

      - name: Run scorer
        if: steps.check-state.outputs.already_done != 'true'
        env:
          DATE: ${{ steps.vars.outputs.date }}
        run: ./bin/scorer --date=$DATE --verbose

      - name: Run digestor
        if: steps.check-state.outputs.already_done != 'true'
        env:
          DATE: ${{ steps.vars.outputs.date }}
          OPENCLAW_TOKEN: ${{ secrets.OPENCLAW_TOKEN }}
          OPENCLAW_AGENT: ${{ secrets.OPENCLAW_AGENT }}
        run: ./bin/digestor --date=$DATE --verbose

      - name: Commit data
        if: steps.check-state.outputs.already_done != 'true'
        run: |
          git config --local user.email "bot@ai-daily-brief.com"
          git config --local user.name "AI Daily Brief Bot"
          git add data/
          git diff --cached --quiet || git commit -m "feat: generate digest for ${{ steps.vars.outputs.date }}"
          git push

